version: "3.9"

services:

  backend:
    build: .
    container_name: docforge_backend
    ports:
      - "8000:8000"
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: docforge_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: